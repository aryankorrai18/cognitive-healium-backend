version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: healium-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: healium-chromadb
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/heartbeat"]
      interval: 15s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: healium-postgres
    environment:
      POSTGRES_DB: healium
      POSTGRES_USER: healium
      POSTGRES_PASSWORD: ${DB_PASSWORD:-healium_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healium"]
      interval: 10s
      timeout: 5s
      retries: 5

  healium-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healium-dashboard
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEYS: ${GROQ_API_KEYS}
      TENANT_ID: ${TENANT_ID:-team_virtusa}
      REDIS_URL: redis://redis:6379
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8001"
      DATABASE_URL: postgresql://healium:${DB_PASSWORD:-healium_dev}@postgres:5432/healium
    volumes:
      - ./static/screenshots:/app/static/screenshots
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
  postgres_data:
